#!/usr/bin/env python
PACKAGE = "vision_pkg"

from dynamic_reconfigure.parameter_generator_catkin import *

gen = ParameterGenerator()

# ── Preprocessing (Bilateral & Canny) ─────────────────────
gen.add("bilateral_d",     int_t, 0, "Bilateral Filter d",          9,  3, 15)
gen.add("bilateral_color", int_t, 0, "Bilateral Filter sigmaColor", 30, 10, 200)
gen.add("bilateral_space", int_t, 0, "Bilateral Filter sigmaSpace", 30, 10, 200)

gen.add("canny_low",  int_t, 0, "Canny Low Threshold", 50,  0, 255)
gen.add("canny_high", int_t, 0, "Canny High Threshold", 120, 0, 255)

# ── Camera Paramerers (Extrinsic & Metric ROI) ────────────
gen.add("camera_height",  double_t, 0, "Camera Height (m)", 1.2, 0.1, 5.0)
gen.add("camera_pitch",   double_t, 0, "Camera Pitch (deg)", 50.0, -90.0, 90.0)
gen.add("camera_fov",     int_t,    0, "Camera Horizontal FOV (deg)", 103, 30, 150)
gen.add("bev_length",     double_t, 0, "BEV ROI Length (m)", 4.0, 1.0, 30.0)
gen.add("bev_width",      double_t, 0, "BEV ROI Width (m)", 4.0, 1.0, 20.0)

# ── Sliding Window ────────────────────────────────────────
gen.add("n_windows",       int_t, 0, "Number of Windows", 10,   5,  80)
gen.add("sw_margin",       int_t, 0, "Window Search Margin", 30,   5, 200)
gen.add("minpix",          int_t, 0, "Min Pixels per Window", 10,   1, 100)
gen.add("minpix_bottom",   int_t, 0, "Min Pixels (Bottom)", 10,   1, 200)
gen.add("max_gap_windows", int_t, 0, "Max Empty Windows", 1,   0,   5)
gen.add("sw_bottom_offset",int_t, 0, "Bottom Offset (px)", 50,   0, 100)
gen.add("minlanepix",      int_t, 0, "Min Total Lane Pixels", 200,  50, 2000)
gen.add("poly_order",      int_t,    0, "Polynomial Order", 1, 1, 3)


# ── Lane Geometry ─────────────────────────────────────────
gen.add("lane_width_px",      int_t, 0, "Default Lane Width (px)", 100,  80, 1000)
gen.add("min_lane_width_px",  int_t, 0, "Min Allowed Spacing (px)", 200, 50, 600)
gen.add("smooth_alpha",       double_t, 0, "Fit Smoothing Alpha", 0.9, 0.0,  1.0)
gen.add("sw_pred_amp",       double_t, 0, "Curve Pred Amplification", 1.2, 1.0, 2.0)
gen.add("sw_curve_ratio",     double_t, 0, "Curve Search Margin Ratio", 0.0, 0.0, 2.0)
gen.add("publish_debug_images", bool_t, 0, "Publish Debug Topics (Heavy)", True)

# ── Save ──────────────────────────────────────────────────
gen.add("save_config", bool_t, 0, "Save Parameters to config.py", False)

exit(gen.generate(PACKAGE, "vision_pkg", "Vision"))
