gen.add("yMin", double_t, 0, "yMinValue", -3.0, -50, 0)
gen.add("yMax", double_t, 0, "yMaxValue", 3.0, 0, 50)
gen.add("zMin", double_t, 0, "zMinValue", 0.2, -2, 2)
gen.add("zMax", double_t, 0, "zMaxValue", 0.4, 0, 50)

# DBScan cfg parameters
gen.add("minPoints", int_t, 0, "minPointsValue", 10, 1, 100)
gen.add("epsilon", double_t, 0, "epsilonValue", 0.44, 0, 2)
gen.add("minClusterSize", double_t, 0, "minClusterSizeValue", 0, 0, 100)
