#!/usr/bin/env python

PACKAGE = "object_detector"

from dynamic_reconfigure.parameter_generator_catkin import *

gen = ParameterGenerator()


# ROI cfg parameters
gen.add("xMin", double_t, 0, "xMinValue", 0.0, -50, 5)
